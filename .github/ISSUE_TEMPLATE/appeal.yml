name: 申诉/恢复收录
description: 对站点被移除、未收录、标记异常等情况发起申诉
title: "[申诉] 请填写站点名称"
labels: ["申诉", "appeal"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交申诉。

        本模板用于处理站点被移除、未通过审核、被标记不可用/异常、信息有误等情况。
        申诉为人工审核，处理速度可能较慢，请耐心等待。

        请尽量提供完整、真实、可验证的信息，方便我们重新判断是否恢复或调整收录状态。

  - type: input
    id: site_name
    attributes:
      label: 站点名称
      description: 请填写需要申诉的站点/渠道名称
      placeholder: 例如：Example AI API
    validations:
      required: true

  - type: input
    id: site_url
    attributes:
      label: 站点网址
      description: 请填写站点首页或控制台网址
      placeholder: https://example.com
    validations:
      required: true

  - type: dropdown
    id: appeal_type
    attributes:
      label: 申诉类型
      description: 请选择最符合当前情况的类型
      options:
        - 站点被移除，申请恢复收录
        - 站点未通过审核，申请重新审核
        - 站点被标记不可用/异常，但现在已恢复
        - 站点信息有误，申请更正
        - 其他情况
    validations:
      required: true

  - type: textarea
    id: appeal_reason
    attributes:
      label: 申诉原因
      description: 请详细说明为什么需要申诉，以及当前问题是否已经修复
      placeholder: |
        例如：
        - 此前因服务器维护导致短暂不可用，现在已恢复
        - 注册与登录功能已修复
        - 亚太地区访问问题已处理
        - 原收录信息有误，希望更正
    validations:
      required: true

  - type: textarea
    id: current_status
    attributes:
      label: 当前站点状态
      description: 请说明站点目前的运行状态、注册登录、可用性和维护情况
      placeholder: |
        例如：
        - 站点目前可正常访问
        - 已支持注册与登录
        - 服务运行稳定
        - 会持续维护可用性
    validations:
      required: true

  - type: textarea
    id: apac_accessibility
    attributes:
      label: 亚太地区访问情况
      description: 请说明新加坡、日本等亚太地区是否可以访问；如有禁用或不可访问地区，请明确标注
      placeholder: |
        例如：
        - 新加坡：可访问
        - 日本：可访问
        - 中国香港：可访问
        - 禁用地区：无 / 请填写具体地区
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 证明材料/补充说明
      description: 可提供截图、监控记录、修复说明、公告链接或其他补充信息
      placeholder: |
        例如：
        - 修复公告链接：
        - 可用性监控截图：
        - 其他说明：
    validations:
      required: false

  - type: input
    id: contact
    attributes:
      label: 联系方式
      description: 如需进一步确认，请留下可联系的方式
      placeholder: Telegram / GitHub
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交确认
      options:
        - label: 我确认该站点目前可以正常访问并流畅运行
          required: true
        - label: 我确认该站点已完善注册与登录功能
          required: true
        - label: 我确认已说明亚太地区访问情况；如有禁用或不可访问地区，已明确标注
          required: true
        - label: 我确认提交的信息真实有效
          required: true
        - label: 我了解申诉为人工审核，处理速度可能较慢
          required: true
