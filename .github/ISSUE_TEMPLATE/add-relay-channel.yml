name: 新增中转站渠道
description: 申请新增一个可用的 AI API 中转站/渠道
title: "[新增渠道] 请填写站点名称"
labels: ["新增渠道", "add"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交新的中转站渠道！

        请确认你的站点已可稳定、流畅运行，并已完善注册与登录功能
        提交后我们会依据可用性、稳定性与信息完整度进行审核

        注意：渠道为人工审核收录，处理速度可能较慢，请耐心等待
        请尽量保证站点在亚太全区可访问，例如新加坡、日本等地区；
        如某些地区禁用或无法访问，请在下方明确标注

        请补充服务器性能信息，例如硬件配置、带宽规格等
        如果带宽包含“峰值”标签，请明确标注，避免误判为独享/稳定带宽

  - type: input
    id: site_name
    attributes:
      label: 站点名称
      description: 请填写你的中转站/渠道名称
      placeholder: 例如：Example AI API
    validations:
      required: true

  - type: input
    id: site_url
    attributes:
      label: 站点网址
      description: 请填写可正常访问的网站首页或控制台网址
      placeholder: https://example.com
    validations:
      required: true

  - type: textarea
    id: availability
    attributes:
      label: 稳定性与可用性说明
      description: 请说明站点目前的运行状态、可用性、速度与维护情况
      placeholder: |
        例如：
        我能保证站点主页可以流畅运行，并会持续维护服务可用性
    validations:
      required: false

  - type: textarea
    id: server_performance
    attributes:
      label: 服务器性能信息
      description: 请填写服务器硬件配置、带宽、线路或其他会影响稳定性的性能信息；如果带宽带有“峰值”标签，请明确标注
      placeholder: |
        - ⚠️此条请认真填写
        例如：
        - 硬件：2H2G
        - 带宽：峰值 200M
        - 线路/地区：新加坡 / 日本 / 中国香港
        - 备注：如带宽为共享、峰值、限速或有流量限制，请在这里标注
    validations:
      required: true

  - type: textarea
    id: apac_accessibility
    attributes:
      label: 亚太地区访问情况
      description: 请说明站点在亚太地区的访问情况，例如新加坡、日本等；如有地区禁用或无法访问，请明确标注
      placeholder: |
        例如：
        - 新加坡：可访问
        - 日本：可访问
        - 中国香港：可访问
        - 如有禁用地区：请在这里标注原因或范围
    validations:
      required: true

  - type: dropdown
    id: free_trial
    attributes:
      label: 是否提供免费测试/试用额度？
      options:
        - 是
        - 否
        - 视情况提供
    validations:
      required: true

  - type: input
    id: contact
    attributes:
      label: 联系方式
      description: 如需审核或补充信息，请留下可联系方式
      placeholder: Telegram / GitHub
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交确认
      options:
        - label: 我确认该站点可以正常访问并流畅运行
          required: true
        - label: 我确认已如实填写服务器性能信息；如带宽为峰值、共享或有限制，已明确标注
          required: true
        - label: 我确认该站点会尽量保证亚太全区可访问；如有禁用或不可访问地区，已在上方明确标注
          required: true
        - label: 我确认提交的信息真实有效，且后续会尽量维护渠道可用性
          required: true
        - label: 我了解渠道为人工审核收录，处理速度可能较慢
          required: true
        - label: 我了解若站点不可用、信息不完整或存在风险，可能不会被收录或降级处理
          required: true
