name: 新增中轉站渠道
description: 申請新增一個可用的 AI API 中轉站/渠道
title: "[新增渠道] 請填寫站點名稱"
labels: ["新增渠道"]
body:
  - type: markdown
    attributes:
      value: |
        感謝你提交新的中轉站渠道！

        請確認你的站點已可穩定、流暢運行，並已完善註冊與登入功能。
        提交後我們會依照可用性、穩定性與資訊完整度進行審核。

  - type: input
    id: site_name
    attributes:
      label: 站點名稱
      description: 請填寫你的中轉站/渠道名稱
      placeholder: 例如：Example AI API
    validations:
      required: true

  - type: input
    id: site_url
    attributes:
      label: 站點網址
      description: 請填寫可正常訪問的網站首頁或控制台網址
      placeholder: https://example.com
    validations:
      required: true

  - type: input
    id: api_endpoint
    attributes:
      label: API 端點
      description: 如支援 OpenAI 相容格式，請填寫 API Base URL
      placeholder: https://api.example.com/v1
    validations:
      required: false

  - type: textarea
    id: supported_models
    attributes:
      label: 支援模型/服務
      description: 請列出目前支援的模型或服務類型
      placeholder: |
        - gpt-4o
        - gpt-4o-mini
        - claude-3.5-sonnet
        - gemini
    validations:
      required: false

  - type: textarea
    id: features
    attributes:
      label: 渠道特色
      description: 請簡要介紹你的站點特色、優勢或適合使用的場景
      placeholder: |
        例如：
        - 支援 OpenAI 相容 API
        - 支援多模型切換
        - 延遲低、穩定性高
        - 提供免費額度/測試額度
    validations:
      required: false

  - type: textarea
    id: registration_login
    attributes:
      label: 註冊與登入功能說明
      description: 請說明目前註冊、登入、找回密碼等帳號功能是否完善
      placeholder: |
        例如：
        - 已支援使用者註冊
        - 已支援帳號密碼登入
        - 已支援郵箱驗證/找回密碼
    validations:
      required: true

  - type: textarea
    id: availability
    attributes:
      label: 穩定性與可用性說明
      description: 請說明站點目前的運行狀態、可用性、速度與維護情況
      placeholder: |
        例如：
        我能保證站點可以流暢運行，並會持續維護服務可用性。
    validations:
      required: true

  - type: dropdown
    id: free_trial
    attributes:
      label: 是否提供免費測試/試用額度？
      options:
        - 是
        - 否
        - 視情況提供
    validations:
      required: true

  - type: input
    id: contact
    attributes:
      label: 聯絡方式
      description: 如需審核或補充資訊，請留下可聯絡方式
      placeholder: Telegram / Email / Discord / GitHub
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交確認
      options:
        - label: 我確認該站點可以正常訪問並流暢運行
          required: true
        - label: 我確認該站點已完善註冊與登入功能
          required: true
        - label: 我確認提交的資訊真實有效，且後續會盡量維護渠道可用性
          required: true
        - label: 我了解若站點不可用、資訊不完整或存在風險，可能不會被收錄
          required: true
